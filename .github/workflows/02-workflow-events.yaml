name: 02 - Workflow Events

on: 
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        - cron: '*/5 * * * *' # every 5 minutes
    workflow_dispatch:

jobs:

  echo:
    runs-on: ubuntu-latest
    steps:
      - name: show the trigger
        run: echo "I have been triggered by ${{ github.event_name }} event"
 